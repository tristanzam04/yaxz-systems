<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="100%" height="100%">
  <style>
    .logo-container {
      cursor: pointer;
    }
    .letter {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 76px;
      font-weight: 900;
      fill: #0A192F;
      transition: fill 0.3s ease;
    }
    
    @keyframes wave {
      0%, 100% {
        transform: translateY(0);
        fill: #0A192F;
      }
      50% {
        transform: translateY(-12px);
        fill: #0066FF; /* Destello en azul eléctrico de la marca */
      }
    }
    
    .logo-container:hover .letter {
      animation: wave 1.0s ease-in-out infinite;
    }
    
    .logo-container:hover .l-1 { animation-delay: 0.0s; }
    .logo-container:hover .l-2 { animation-delay: 0.12s; }
    .logo-container:hover .l-3 { animation-delay: 0.24s; }
    .logo-container:hover .l-4 { animation-delay: 0.36s; }
  </style>
  
  <g class="logo-container">
    <!-- Rectángulo invisible para capturar el hover de forma consistente en toda el área -->
    <rect width="100%" height="100%" fill="transparent"/>
    
    <!-- Posicionamiento individual de letras para transformaciones 3D independientes -->
    <text x="160" y="115" class="letter l-1">Y</text>
    <text x="215" y="115" class="letter l-2">A</text>
    <text x="275" y="115" class="letter l-3">X</text>
    <text x="330" y="115" class="letter l-4">Z</text>
  </g>
</svg>
